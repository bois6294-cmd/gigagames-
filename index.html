<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GigaGames Hub</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {background:#1e293b;padding:15px;text-align:center;font-size:28px;font-weight:bold;}
#search {width:80%;padding:10px;margin:20px auto;display:block;border-radius:8px;border:none;}
.games {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px;}
.card {background:#1e293b;border-radius:12px;padding:15px;text-align:center;cursor:pointer;}
.card:hover {background:#334155;}
iframe {width:100%;height:80vh;border:none;margin-top:10px;}
.notice {text-align:center;margin-top:10px;color:#94a3b8;}
</style>

</head>
<body>

<header>🎮 GigaGames Hub</header>

<input id="search" placeholder="Search games..." oninput="renderGames()">

<div class="games" id="games"></div>
<div id="gameArea"></div>
<div class="notice">If a game doesn't load, it will open in a new tab.</div>

<script>

// ✅ ONLY VERIFIED WORKING GAMES
const gameList = [
  {name:'2048', url:'https://play2048.co/', embed:true},
  {name:'Hextris', url:'https://hextris.io/', embed:true},
  {name:'Flappy Bird', url:'https://nebezb.com/floppybird/', embed:true},
  {name:'Snake', url:'https://playsnake.org/', embed:true},

  // fallback (opens new tab if blocked)
  {name:'Run 3', url:'https://ubg100.github.io/games/run-3/', embed:false},
  {name:'Slope', url:'https://ubg100.github.io/games/slope/', embed:false}
];

function renderGames(){
  const search = document.getElementById('search').value.toLowerCase();

  document.getElementById('games').innerHTML = gameList
    .filter(g => g.name.toLowerCase().includes(search))
    .map(g => `<div class="card" onclick="openGame('${g.url}', ${g.embed})">${g.name}</div>`)
    .join('');
}

function openGame(url, embed){
  if(embed){
    document.getElementById('gameArea').innerHTML = `<iframe src="${url}"></iframe>`;
  } else {
    window.open(url, '_blank'); // 🔥 fallback
  }
}

renderGames();

</script>

</body>
</html>
