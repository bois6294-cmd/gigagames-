<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GigaGames Hub</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;}
header {background:#1e293b;padding:15px;text-align:center;font-size:28px;font-weight:bold;}
#search {width:80%;padding:10px;margin:20px auto;display:block;border-radius:8px;border:none;}
.categories {text-align:center;margin-bottom:10px;}
.categories button {margin:5px;padding:8px 12px;border:none;border-radius:6px;cursor:pointer;}
.games {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px;}
.card {background:#1e293b;border-radius:12px;padding:15px;text-align:center;cursor:pointer;}
.card:hover {background:#334155;}
iframe {width:100%;height:80vh;border:none;margin-top:10px;}
</style>

</head>
<body>

<header>🎮 GigaGames Hub</header>

<input id="search" placeholder="Search games..." oninput="filterGames()">

<div class="categories">
  <button onclick="setCategory('all')">All</button>
  <button onclick="setCategory('action')">Action</button>
  <button onclick="setCategory('puzzle')">Puzzle</button>
  <button onclick="setCategory('arcade')">Arcade</button>
</div>

<div class="games" id="games"></div>
<div id="gameArea"></div>

<script>

const gameList = [
  {name:'2048', url:'https://play2048.co/', category:'puzzle'},
  {name:'Slope', url:'https://ubg100.github.io/games/slope/', category:'action'},
  {name:'Run 3', url:'https://ubg100.github.io/games/run-3/', category:'action'},
  {name:'Pacman', url:'https://ubg100.github.io/games/pacman/', category:'arcade'},
  {name:'Flappy Bird', url:'https://ubg100.github.io/games/flappy-bird/', category:'arcade'}
];

let currentCategory = 'all';

function renderGames(){
  const container = document.getElementById('games');
  const search = document.getElementById('search').value.toLowerCase();

  container.innerHTML = gameList
    .filter(g => (currentCategory==='all'||g.category===currentCategory) && g.name.toLowerCase().includes(search))
    .map(g => `<div class="card" onclick="loadGame('${g.url}')">${g.name}</div>`)
    .join('');
}

function loadGame(url){
  document.getElementById('gameArea').innerHTML = `<iframe src="${url}"></iframe>`;
}

function setCategory(cat){
  currentCategory = cat;
  renderGames();
}

function filterGames(){
  renderGames();
}

renderGames();

</script>

</body>
</html>
