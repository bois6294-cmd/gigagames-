<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>GigaGames Hub</title>

<style>
body {margin:0;font-family:Arial;background:#0f172a;color:white;text-align:center;}
header {background:#1e293b;padding:15px;font-size:28px;font-weight:bold;}
.games {display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:20px;}
.card {background:#1e293b;border-radius:12px;padding:15px;cursor:pointer;}
.card:hover {background:#334155;}
canvas {background:black;margin-top:20px;}
button {padding:10px;margin:5px;}
</style>

</head>
<body>

<header>🎮 GigaGames Hub</header>

<div class="games">
  <div class="card" onclick="snake()">Snake</div>
  <div class="card" onclick="pong()">Pong</div>
  <div class="card" onclick="clicker()">Clicker</div>
</div>

<div id="gameArea"></div>

<script>

// ===== SNAKE =====
function snake(){
  gameArea.innerHTML='<canvas id="c" width="400" height="400"></canvas>';
  let ctx=c.getContext('2d');
  let s=[{x:10,y:10}],dx=1,dy=0,f={x:5,y:5};

  document.onkeydown=e=>{
    if(e.key==='ArrowUp'){dx=0;dy=-1}
    if(e.key==='ArrowDown'){dx=0;dy=1}
    if(e.key==='ArrowLeft'){dx=-1;dy=0}
    if(e.key==='ArrowRight'){dx=1;dy=0}
  }

  setInterval(()=>{
    let h={x:s[0].x+dx,y:s[0].y+dy};
    s.unshift(h);
    if(h.x===f.x&&h.y===f.y){f={x:Math.random()*20|0,y:Math.random()*20|0}} else s.pop();

    ctx.fillRect(0,0,400,400);
    ctx.fillStyle='lime';s.forEach(p=>ctx.fillRect(p.x*20,p.y*20,18,18));
    ctx.fillStyle='red';ctx.fillRect(f.x*20,f.y*20,18,18);
  },100);
}

// ===== PONG =====
function pong(){
  gameArea.innerHTML='<canvas id="p" width="400" height="400"></canvas>';
  let ctx=p.getContext('2d');
  let y=150, ball={x:200,y:200,dx:3,dy:3};

  document.onmousemove=e=>y=e.clientY-200;

  setInterval(()=>{
    ctx.fillRect(0,0,400,400);

    ctx.fillStyle='white';
    ctx.fillRect(10,y,10,80);

    ball.x+=ball.dx;
    ball.y+=ball.dy;

    if(ball.y<0||ball.y>400) ball.dy*=-1;
    if(ball.x<20&&ball.y>y&&ball.y<y+80) ball.dx*=-1;
    if(ball.x>400) ball.x=200;

    ctx.fillRect(ball.x,ball.y,10,10);
  },30);
}

// ===== CLICKER =====
function clicker(){
  let score=0;
  gameArea.innerHTML=`
    <h2>Clicker</h2>
    <h1 id="s">0</h1>
    <button onclick="add()">CLICK</button>
  `;
  window.add=()=>{score++;s.innerText=score;}
}

</script>

</body>
</html>
